name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Change to 'master' if your branch is called master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "1. Moving into the project folder..."
            cd ~/ai-cricket-analystt
            
            echo "2. Pulling the latest code from GitHub..."
            git pull origin main
            
            echo "3. Stopping and removing the old Docker container..."
            sudo docker ps -q --filter ancestor=cricket-api | xargs -r sudo docker stop
            sudo docker ps -a -q --filter ancestor=cricket-api | xargs -r sudo docker rm
            
            echo "4. Building the new, updated Docker image..."
            sudo docker build -t cricket-api .
            
            echo "5. Starting the new container in the background..."
            sudo docker run -d -p 8000:8000 cricket-api
            
            echo "Deployment Successful, Bro!"